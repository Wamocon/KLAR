<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>KLAR Side Panel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      padding: 0;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a2e; color: #e0e0e0; }
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid #e5e7eb;
      background: linear-gradient(135deg, #f0fdf4, #f0f9ff);
    }
    @media (prefers-color-scheme: dark) {
      .header { background: linear-gradient(135deg, #0f2a1a, #0f1f3a); border-bottom-color: #374151; }
    }
    .logo {
      font-size: 20px;
      font-weight: 800;
      background: linear-gradient(135deg, #059669, #0891b2);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tagline { font-size: 11px; color: #9ca3af; margin-top: 2px; }
    .content { padding: 16px; }

    /* Empty state */
    .empty-state { text-align: center; padding: 32px 16px; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.3; }
    .empty-title { font-size: 14px; font-weight: 600; color: #6b7280; margin-bottom: 6px; }
    .empty-hint { font-size: 12px; color: #9ca3af; line-height: 1.5; }
    .empty-hint strong { color: #059669; }

    /* Loading */
    .loading { display: none; align-items: center; gap: 10px; padding: 24px 0; justify-content: center; }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #e5e7eb; border-top-color: #059669;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: #6b7280; }

    /* Result */
    .result { display: none; }
    .score-section { text-align: center; padding: 16px 0; }
    .score-number { font-size: 42px; font-weight: 800; display: block; line-height: 1.1; }
    .score-label { font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.06em; }
    .claims-bar {
      display: flex; justify-content: center; gap: 12px; font-size: 12px;
      margin: 8px 0 16px; font-weight: 500;
    }
    .cb-supported { color: #22c55e; }
    .cb-contradicted { color: #ef4444; }
    .cb-unknown { color: #eab308; }

    .claims-list { border-top: 1px solid #e5e7eb; padding-top: 12px; }
    @media (prefers-color-scheme: dark) { .claims-list { border-top-color: #374151; } }
    .claim {
      display: flex; gap: 8px; padding: 8px 0;
      font-size: 13px; line-height: 1.4;
      border-bottom: 1px solid #f3f4f6;
    }
    @media (prefers-color-scheme: dark) { .claim { border-bottom-color: #1f2937; } }
    .claim-verdict {
      flex-shrink: 0; font-size: 9px; font-weight: 700; text-transform: uppercase;
      padding: 2px 6px; border-radius: 4px; align-self: flex-start; margin-top: 2px;
    }
    .claim-supported .claim-verdict { background: #dcfce7; color: #16a34a; }
    .claim-contradicted .claim-verdict { background: #fee2e2; color: #dc2626; }
    .claim-unverifiable .claim-verdict { background: #fef9c3; color: #ca8a04; }
    .claim-text { color: #4b5563; }
    @media (prefers-color-scheme: dark) { .claim-text { color: #d1d5db; } }
    .more-claims { font-size: 12px; color: #9ca3af; text-align: center; margin-top: 8px; }
    .proc-time { font-size: 11px; color: #9ca3af; text-align: center; margin-top: 10px; }

    /* Error */
    .error { display: none; text-align: center; padding: 20px 0; }
    .error-icon { font-size: 32px; margin-bottom: 8px; }
    .error-title { font-size: 14px; font-weight: 600; color: #ef4444; margin-bottom: 4px; }
    .error-message { font-size: 12px; color: #9ca3af; line-height: 1.4; }
    .error-retry {
      display: inline-block; margin-top: 12px; padding: 6px 16px;
      font-size: 12px; font-weight: 600; color: #fff; border: none; border-radius: 8px;
      background: linear-gradient(135deg, #059669, #0891b2); cursor: pointer;
    }
    .error-retry:hover { opacity: 0.9; }

    /* History */
    .history { margin-top: 16px; border-top: 1px solid #e5e7eb; padding-top: 12px; }
    @media (prefers-color-scheme: dark) { .history { border-top-color: #374151; } }
    .history-title { font-size: 11px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 10px; border-radius: 8px; margin-bottom: 4px; font-size: 12px; cursor: default;
    }
    .history-item:hover { background: #f3f4f6; }
    @media (prefers-color-scheme: dark) { .history-item:hover { background: #1f2937; } }
    .history-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 8px; color: #6b7280; }
    .history-score { font-weight: 700; font-size: 13px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">KLAR</div>
    <div class="tagline">AI Content Verifier</div>
  </div>
  <div class="content">
    <div id="empty" class="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">No verification yet</div>
      <p class="empty-hint">
        Select text on any page and right-click →<br>
        <strong>Verify with KLAR</strong>
      </p>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <span class="loading-text">Verifying claims…</span>
    </div>

    <div id="result" class="result"></div>

    <div id="error" class="error">
      <div class="error-icon">⚠️</div>
      <div id="errorTitle" class="error-title">Verification failed</div>
      <div id="errorMessage" class="error-message"></div>
    </div>

    <div id="history" class="history" style="display:none;">
      <div class="history-title">Recent verifications</div>
      <div id="historyList"></div>
    </div>
  </div>

  <script src="constants.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
