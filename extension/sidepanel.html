<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>KLAR Side Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-base: #0c111b;
      --bg-card: #151c2c;
      --bg-card-hover: #1a2338;
      --bg-elevated: #1e293b;
      --border: rgba(255,255,255,0.07);
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted: #8b9dc3;
      --text-dim: #5a6d8a;
      --accent: #10b981;
      --accent-glow: rgba(16,185,129,0.15);
      --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: 'JetBrains Mono', 'SF Mono', monospace;
    }
    body {
      font-family: var(--font);
      background: var(--bg-base); color: var(--text-primary); padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Header ─── */
    .header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(145deg, #0d1f14 0%, var(--bg-base) 40%, #0d1526 100%);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-icon {
      width: 32px; height: 32px; border-radius: 10px;
      flex-shrink: 0;
    }
    .header-text .logo { font-size: 16px; font-weight: 700; color: var(--text-primary); letter-spacing: 0.04em; }
    .header-text .tagline { font-size: 10px; color: var(--text-dim); }
    .header-actions { display: flex; gap: 6px; }
    .header-btn {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text-muted); font-size: 12px; padding: 5px 10px; cursor: pointer;
      transition: all 0.2s; text-decoration: none;
    }
    .header-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .content { padding: 16px; }

    /* ─── Empty state ─── */
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
    .empty-title { font-size: 15px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
    .empty-hint { font-size: 12px; color: var(--text-dim); line-height: 1.7; }
    .empty-steps { text-align: left; max-width: 260px; margin: 16px auto 0; }
    .empty-step { display: flex; gap: 10px; margin-bottom: 10px; font-size: 12px; color: var(--text-muted); }
    .step-num { width: 20px; height: 20px; border-radius: 50%; background: var(--bg-card); color: var(--text-muted); font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    /* ─── Loading ─── */
    .loading { display: none; flex-direction: column; align-items: center; gap: 16px; padding: 60px 0; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--bg-elevated); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: var(--text-muted); }
    .loading-sub { font-size: 11px; color: var(--text-dim); margin-top: -8px; }

    /* ─── Score Card ─── */
    .score-card {
      text-align: center; padding: 24px 16px 16px;
      background: var(--bg-card); border-radius: 14px; margin-bottom: 14px;
    }
    .score-ring { font-size: 52px; font-weight: 800; display: block; line-height: 1.1; }
    .score-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; display: block; }
    .claims-bar { display: flex; justify-content: center; gap: 20px; font-size: 12px; font-weight: 600; margin-top: 12px; }
    .cb-s { color: #4ade80; } .cb-c { color: #f87171; } .cb-u { color: #94a3b8; }

    /* ─── Claim Cards ─── */
    .section-title { font-size: 10px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin: 14px 0 8px 2px; }
    .claim-card {
      background: var(--bg-card); border-radius: 12px; padding: 14px;
      margin-bottom: 10px; border-left: 3px solid #334155;
    }
    .claim-card.supported { border-left-color: #22c55e; }
    .claim-card.contradicted { border-left-color: #ef4444; }
    .claim-card.unverifiable { border-left-color: #64748b; }
    .claim-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .claim-badge { font-size: 9px; font-weight: 700; text-transform: uppercase; padding: 3px 8px; border-radius: 5px; letter-spacing: 0.04em; }
    .supported .claim-badge { background: rgba(34,197,94,0.15); color: #4ade80; }
    .contradicted .claim-badge { background: rgba(239,68,68,0.15); color: #f87171; }
    .unverifiable .claim-badge { background: rgba(100,116,139,0.15); color: #94a3b8; }
    .claim-conf { font-size: 10px; color: var(--text-dim); font-family: var(--mono); }
    .claim-text { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 6px; }
    .claim-reasoning { font-size: 11px; color: var(--text-muted); line-height: 1.5; margin-bottom: 8px; font-style: italic; }
    .claim-sources { display: flex; flex-wrap: wrap; gap: 5px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.04); }
    .source-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; background: rgba(6,182,212,0.08);
      border: 1px solid rgba(6,182,212,0.15); border-radius: 6px;
      color: #22d3ee; font-size: 11px; text-decoration: none;
      transition: background 0.15s; max-width: 280px; overflow: hidden;
    }
    .source-pill:hover { background: rgba(6,182,212,0.18); }
    .source-pill-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .source-type { font-size: 9px; color: var(--text-dim); }

    /* ─── Analysis Cards ─── */
    .analysis-card {
      background: var(--bg-card); border-radius: 12px; padding: 14px; margin-bottom: 10px;
    }
    .analysis-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .analysis-icon { font-size: 18px; }
    .analysis-title { font-size: 14px; font-weight: 700; color: var(--text-primary); flex: 1; }
    .analysis-badge { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .bar-track { flex: 1; height: 6px; background: var(--bg-base); border-radius: 3px; overflow: hidden; }
    .bar-track-sm { height: 4px; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
    .bar-value { font-size: 12px; font-weight: 600; font-family: var(--mono); min-width: 44px; text-align: right; }
    .signal-list { display: flex; flex-direction: column; gap: 6px; }
    .signal-item { padding: 8px 10px; background: rgba(255,255,255,0.03); border-radius: 8px; border-left: 2px solid var(--text-dim); }
    .signal-item.low { border-left-color: #eab308; }
    .signal-item.medium { border-left-color: #f97316; }
    .signal-item.high { border-left-color: #ef4444; }
    .signal-type { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: capitalize; margin-bottom: 2px; }
    .signal-detail { font-size: 11px; color: var(--text-muted); line-height: 1.5; }
    .signal-examples { font-size: 10px; color: var(--text-dim); margin-top: 4px; font-family: var(--mono); }
    .analysis-clean { font-size: 12px; color: #4ade80; text-align: center; padding: 10px 0; }
    .analysis-summary { font-size: 12px; color: var(--text-muted); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); line-height: 1.6; }
    .analysis-desc { font-size: 11px; color: var(--text-dim); line-height: 1.5; margin-bottom: 10px; }
    .score-desc { font-size: 11px; color: var(--text-dim); line-height: 1.5; margin-top: 6px; text-align: center; }

    /* ─── Verdict Summary ─── */
    .verdict-summary {
      border-radius: 12px; padding: 14px; margin-bottom: 10px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .verdict-header { font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
    .verdict-text { font-size: 12px; color: var(--text-secondary); line-height: 1.65; }

    /* ─── Plagiarism matches ─── */
    .match-item { padding: 8px 10px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 6px; }
    .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .match-pct { font-size: 11px; font-weight: 700; font-family: var(--mono); }
    .match-source a { font-size: 11px; color: #22d3ee; text-decoration: none; }
    .match-source a:hover { text-decoration: underline; }
    .match-text { font-size: 11px; color: var(--text-muted); font-style: italic; }

    /* ─── History ─── */
    .history { margin-top: 16px; border-top: 1px solid var(--bg-card); padding-top: 14px; }
    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 12px; border-radius: 8px; margin-bottom: 4px; cursor: pointer;
      transition: background 0.2s;
    }
    .history-item:hover { background: var(--bg-card); }
    .history-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 8px; color: var(--text-muted); font-size: 12px; }
    .history-score { font-weight: 700; font-size: 13px; }
    .history-time { font-size: 10px; color: var(--text-dim); margin-left: 8px; }

    /* ─── Error ─── */
    .error { display: none; text-align: center; padding: 40px 20px; }
    .error-icon { font-size: 36px; margin-bottom: 12px; }
    .error-title { font-size: 15px; font-weight: 600; color: #f87171; margin-bottom: 8px; }
    .error-message { font-size: 12px; color: var(--text-muted); line-height: 1.6; }
    .retry-btn {
      margin-top: 16px; padding: 10px 28px; border: 1px solid var(--border);
      border-radius: 10px; background: var(--bg-card); color: var(--text-primary);
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
      font-family: var(--font);
    }
    .retry-btn:hover { background: var(--bg-card-hover); border-color: rgba(255,255,255,0.12); }
    .error-hint { font-size: 11px; color: var(--text-dim); margin-top: 10px; line-height: 1.5; }

    /* ─── Utility ─── */
    .proc-time { font-size: 11px; color: var(--text-dim); text-align: center; margin: 12px 0 4px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <img class="header-icon" src="icons/icon-32.png" alt="KLAR">
      <div class="header-text">
        <div class="logo">KLAR</div>
        <div class="tagline">AI Content Verifier</div>
      </div>
    </div>
    <div class="header-actions">
      <a class="header-btn" id="openAppBtn" target="_blank" rel="noopener">Open App</a>
    </div>
  </div>

  <div class="content">
    <div id="empty" class="empty-state">
      <div class="empty-icon">KLAR</div>
      <div class="empty-title">No verification yet</div>
      <div class="empty-steps">
        <div class="empty-step"><span class="step-num">1</span> Select text on any webpage</div>
        <div class="empty-step"><span class="step-num">2</span> Click the KLAR extension icon</div>
        <div class="empty-step"><span class="step-num">3</span> Choose an analysis action</div>
      </div>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <span class="loading-text">Analyzing content…</span>
      <span class="loading-sub">This may take 10–30 seconds</span>
    </div>

    <div id="result" class="result hidden"></div>

    <div id="error" class="error">
      <div class="error-icon">!</div>
      <div id="errorTitle" class="error-title">Verification failed</div>
      <div id="errorMessage" class="error-message"></div>
      <button id="retryBtn" class="retry-btn" style="display:none;">Retry</button>
    </div>

    <div id="history" class="history hidden">
      <div class="section-title">Recent verifications</div>
      <div id="historyList"></div>
    </div>
  </div>

  <script src="constants.js"></script>
  <script src="i18n.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
