<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>KLAR Side Panel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      padding: 16px;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a2e; color: #e0e0e0; }
    }
    .logo {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, #059669, #0891b2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }
    .hint {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.5;
    }
    .hint strong { color: #059669; }
  </style>
</head>
<body>
  <div class="logo">KLAR</div>
  <p class="hint">
    Select text on any page and right-click → <strong>Verify with KLAR</strong> to check AI-generated claims against real sources.
  </p>
  <p class="hint" style="margin-top: 12px;">
    Results will appear in an overlay on the page.
  </p>
</body>
</html>
