<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=380">
  <title>KLAR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-base: #0c111b;
      --bg-card: #151c2c;
      --bg-card-hover: #1a2338;
      --bg-elevated: #1e293b;
      --border: rgba(255,255,255,0.07);
      --border-active: rgba(16,185,129,0.4);
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted: #8b9dc3;
      --text-dim: #5a6d8a;
      --accent: #10b981;
      --accent-glow: rgba(16,185,129,0.15);
      --cyan: #06b6d4;
      --purple: #a78bfa;
      --amber: #f59e0b;
      --rose: #f43f5e;
      --orange: #f97316;
      --teal: #14b8a6;
      --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: 'JetBrains Mono', 'SF Mono', monospace;
    }
    body {
      width: 400px;
      font-family: var(--font);
      background: var(--bg-base);
      color: var(--text-primary);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .hidden { display: none !important; }

    /* ─── Header ─── */
    .header {
      padding: 16px 20px;
      background: linear-gradient(145deg, #0d1f14 0%, var(--bg-base) 40%, #0d1526 100%);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-icon { width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0; }
    .header-text .logo {
      font-size: 17px; font-weight: 700; color: var(--text-primary);
      letter-spacing: 0.04em;
    }
    .header-text .tagline { font-size: 11px; color: var(--text-dim); font-weight: 400; }
    .header-actions { display: flex; gap: 6px; }
    .header-btn {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text-muted); font-size: 14px; padding: 6px 9px; cursor: pointer;
      transition: all 0.2s; text-decoration: none; line-height: 1;
      display: flex; align-items: center; justify-content: center;
    }
    .header-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); border-color: rgba(255,255,255,0.12); }

    /* ─── Language Toggle ─── */
    .lang-toggle {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
      color: var(--accent); font-size: 11px; font-weight: 700; padding: 5px 10px;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.06em;
      font-family: var(--mono); line-height: 1;
    }
    .lang-toggle:hover { background: var(--bg-card-hover); border-color: rgba(16,185,129,0.3); }

    /* ─── Setup ─── */
    .setup { padding: 28px 20px; }
    .setup-title { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
    .setup-desc { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 22px; }
    .setup-desc a { color: var(--cyan); text-decoration: none; font-weight: 500; }
    .setup-desc a:hover { text-decoration: underline; }

    /* ─── Main ─── */
    .main { padding: 14px 16px 16px; }

    /* ─── Capture Toggle ─── */
    .capture-toggle {
      display: flex; gap: 3px; margin-bottom: 12px;
      background: var(--bg-base); border: 1px solid var(--border);
      border-radius: 12px; padding: 3px;
    }
    .capture-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 8px 6px; border: none; border-radius: 10px;
      background: transparent; color: var(--text-dim); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; font-family: var(--font);
    }
    .capture-btn:hover { color: var(--text-muted); background: rgba(255,255,255,0.03); }
    .capture-btn.active {
      background: var(--bg-card); color: var(--accent);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .capture-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* ─── Selection Card ─── */
    .selection-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 14px; margin-bottom: 14px;
      transition: border-color 0.2s;
    }
    .selection-card.has-text { border-color: var(--border-active); }
    .selection-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .selection-label { font-size: 10px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
    .selection-count { font-size: 10px; color: var(--text-dim); font-family: var(--mono); font-weight: 500; }
    .selection-count.valid { color: var(--accent); }
    .selection-count.invalid { color: var(--rose); }
    .selection-text {
      font-size: 13px; color: var(--text-secondary); line-height: 1.55;
      max-height: 48px; overflow: hidden;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .selection-empty { font-size: 13px; color: var(--text-dim); }

    /* ─── Section Labels ─── */
    .section-label {
      font-size: 10px; font-weight: 700; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 8px; padding: 0 2px;
    }

    /* ─── Actions Grid ─── */
    .actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .action-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 12px; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; cursor: pointer; transition: all 0.2s;
      text-align: left; position: relative; overflow: hidden;
    }
    .action-btn::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, transparent 60%, var(--btn-glow, transparent));
      opacity: 0; transition: opacity 0.3s;
    }
    .action-btn:hover { background: var(--bg-card-hover); border-color: rgba(255,255,255,0.1); transform: translateY(-1px); }
    .action-btn:hover::before { opacity: 1; }
    .action-btn:active { transform: translateY(0); }
    .action-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }
    .action-btn.full-width { grid-column: 1 / -1; }
    .action-icon {
      width: 32px; height: 32px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; position: relative; z-index: 1;
    }
    .action-icon svg { width: 16px; height: 16px; }
    .action-icon.green { background: rgba(16,185,129,0.12); color: #34d399; --btn-glow: rgba(16,185,129,0.06); }
    .action-icon.cyan { background: rgba(6,182,212,0.12); color: #22d3ee; --btn-glow: rgba(6,182,212,0.06); }
    .action-icon.purple { background: rgba(167,139,250,0.12); color: #a78bfa; --btn-glow: rgba(167,139,250,0.06); }
    .action-icon.orange { background: rgba(249,115,22,0.12); color: #fb923c; --btn-glow: rgba(249,115,22,0.06); }
    .action-icon.teal { background: rgba(20,184,166,0.12); color: #2dd4bf; --btn-glow: rgba(20,184,166,0.06); }
    .action-icon.rose { background: rgba(244,63,94,0.12); color: #fb7185; --btn-glow: rgba(244,63,94,0.06); }
    .action-icon.amber { background: rgba(245,158,11,0.12); color: #fbbf24; --btn-glow: rgba(245,158,11,0.06); }
    .action-icon.blue { background: rgba(59,130,246,0.12); color: #60a5fa; --btn-glow: rgba(59,130,246,0.06); }
    .action-info { flex: 1; min-width: 0; position: relative; z-index: 1; }
    .action-name { font-size: 13px; font-weight: 600; color: var(--text-primary); line-height: 1.2; }
    .action-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; line-height: 1.3; }

    /* ─── Divider ─── */
    .section-divider {
      height: 1px; background: var(--border); margin: 4px 0 12px;
    }

    /* ─── Quick Links ─── */
    .quick-links { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-bottom: 14px; }
    .quick-link {
      padding: 10px 6px; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; text-align: center; text-decoration: none;
      font-size: 11px; font-weight: 500; color: var(--text-muted);
      transition: all 0.2s; cursor: pointer; display: flex; flex-direction: column;
      align-items: center; gap: 4px;
    }
    .quick-link:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .quick-link svg { width: 16px; height: 16px; opacity: 0.7; }
    .quick-link:hover svg { opacity: 1; }

    /* ─── Key Footer ─── */
    .key-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: var(--bg-card); border-radius: 10px;
      border: 1px solid var(--border);
    }
    .key-info { display: flex; align-items: center; gap: 8px; }
    .key-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; box-shadow: 0 0 6px var(--accent-glow); }
    .key-prefix { font-size: 12px; color: var(--text-muted); font-family: var(--mono); font-weight: 500; }
    .key-change {
      font-size: 11px; color: var(--text-dim); background: none; border: none;
      cursor: pointer; padding: 2px 0; font-family: var(--font); font-weight: 500;
      transition: color 0.15s;
    }
    .key-change:hover { color: var(--text-muted); }

    /* ─── Input ─── */
    .input-group { position: relative; margin-bottom: 14px; }
    .input-group input {
      width: 100%; padding: 12px 44px 12px 14px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; font-size: 13px; color: var(--text-primary);
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: var(--mono); font-weight: 400;
    }
    .input-group input::placeholder { color: var(--text-dim); }
    .input-group input:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(6,182,212,0.12); }
    .toggle-vis {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-dim); cursor: pointer;
      font-size: 12px; padding: 4px; font-family: var(--font); font-weight: 500;
    }
    .toggle-vis:hover { color: var(--text-muted); }

    /* ─── Buttons ─── */
    .btn {
      width: 100%; padding: 12px 16px; border: none; border-radius: 12px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.2s ease; display: flex; align-items: center;
      justify-content: center; gap: 8px; font-family: var(--font);
    }
    .btn-primary {
      background: linear-gradient(135deg, #059669, #0891b2);
      color: white; box-shadow: 0 2px 12px rgba(5,150,105,0.2);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(5,150,105,0.3); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    /* ─── Toast ─── */
    .toast {
      position: fixed; bottom: 16px; left: 16px; right: 16px;
      padding: 12px 16px; border-radius: 12px; font-size: 13px; font-weight: 600;
      z-index: 100; opacity: 0; transition: all 0.3s ease; pointer-events: none;
      text-align: center; line-height: 1.4; backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transform: translateY(8px);
    }
    .toast.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .toast-ok { background: rgba(6,95,70,0.9); color: #a7f3d0; border: 1px solid rgba(5,150,105,0.4); }
    .toast-error { background: rgba(127,29,29,0.9); color: #fecaca; border: 1px solid rgba(220,38,38,0.4); }
    .toast-info { background: rgba(22,78,99,0.9); color: #a5f3fc; border: 1px solid rgba(8,145,178,0.4); }

    /* ─── Spinner ─── */
    .spinner-sm {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.2); border-top-color: white;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="toast" class="toast"></div>

  <div class="header">
    <div class="header-left">
      <img class="header-icon" src="icons/icon-32.png" alt="KLAR">
      <div class="header-text">
        <div class="logo">KLAR</div>
        <div class="tagline" data-i18n="tagline">AI Content Verifier</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="lang-toggle" id="langToggle" title="Switch language / Sprache wechseln">EN</button>
      <a class="header-btn" id="openAppBtn" title="Open KLAR App" target="_blank" rel="noopener">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16"><circle cx="10" cy="10" r="7.5"/><path d="M2.5 10h15M10 2.5a12 12 0 0 1 3 7.5 12 12 0 0 1-3 7.5 12 12 0 0 1-3-7.5 12 12 0 0 1 3-7.5z"/></svg>
      </a>
      <button class="header-btn" id="settingsToggle" title="Settings">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16"><circle cx="10" cy="10" r="2.5"/><path d="M10 1.5v2m0 13v2m-6-8.5h2m13 0h-2m-1.3-5.2-1.4 1.4m-9.6 9.6-1.4 1.4m0-12.4 1.4 1.4m9.6 9.6 1.4 1.4"/></svg>
      </button>
    </div>
  </div>

  <!-- ═══ SETUP SCREEN ═══ -->
  <div id="setupScreen" class="setup hidden">
    <div class="setup-title" data-i18n="setupTitle">Connect your account</div>
    <div class="setup-desc">
      <span data-i18n="setupDesc">Enter your API key to start verifying content.</span><br>
      <a id="getKeyLink" href="#" target="_blank" rel="noopener" data-i18n="generateInSettings">Generate one in Settings →</a>
    </div>
    <div class="input-group">
      <input type="password" id="apiKeyInput" placeholder="klar_xxxxxxxx_..." autocomplete="off" spellcheck="false">
      <button class="toggle-vis" id="toggleVis" data-i18n="showKey">Show</button>
    </div>
    <button class="btn btn-primary" id="saveKeyBtn">
      <span class="spinner-sm" id="saveSpinner"></span>
      <span id="saveBtnText" data-i18n="verifyAndSaveKey">Verify &amp; Save Key</span>
    </button>
  </div>

  <!-- ═══ MAIN SCREEN ═══ -->
  <div id="mainScreen" class="main hidden">
    <!-- Capture Mode Toggle -->
    <div class="capture-toggle" id="captureToggle">
      <button class="capture-btn active" id="captureSelection" title="Analyze selected text">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 3h2M13 3h2M5 17h2M13 17h2M3 5v2M3 13v2M17 5v2M17 13v2"/></svg>
        <span data-i18n="captureSelectionLabel">Selection</span>
      </button>
      <button class="capture-btn" id="capturePage" title="Analyze entire visible page">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="2" width="14" height="16" rx="2"/><path d="M7 6h6M7 10h6M7 14h3"/></svg>
        <span data-i18n="captureFullPage">Full Page</span>
      </button>
      <button class="capture-btn" id="captureUrl" title="Analyze page via URL (server-side)">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 12l4-4M7 9.5 5 11.5a2.8 2.8 0 0 0 4 4l2-2M13 10.5l2-2a2.8 2.8 0 0 0-4-4l-2 2"/></svg>
        <span data-i18n="captureUrlLabel">URL</span>
      </button>
    </div>

    <!-- Selection Preview -->
    <div class="selection-card" id="selectionCard">
      <div class="selection-header">
        <span class="selection-label" id="selLabel" data-i18n="selectedText">Selected text</span>
        <span class="selection-count" id="selCount"></span>
      </div>
      <div id="selContent">
        <div class="selection-empty" id="selEmpty" data-i18n="selectTextHintFull">Select text on a page, then pick an action below</div>
        <div class="selection-text hidden" id="selText"></div>
      </div>
    </div>

    <!-- ─── Primary Action ─── -->
    <div class="section-label" data-i18n="verifyContentTitle">Verify Content</div>
    <div class="actions-grid" id="actionsGrid">
      <button class="action-btn full-width" data-analysis="fact-check" disabled style="--btn-glow: rgba(16,185,129,0.08);">
        <div class="action-icon green"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 10l3 3 5-6"/><circle cx="10" cy="10" r="7.5"/></svg></div>
        <div class="action-info">
          <div class="action-name" data-i18n="factCheck">Fact Check</div>
          <div class="action-desc" data-i18n="factCheckDesc">Verify claims against real sources</div>
        </div>
      </button>
      <button class="action-btn" data-analysis="bias-check" disabled>
        <div class="action-icon cyan"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 16l3-6 3 4 3-8 3 10"/></svg></div>
        <div class="action-info">
          <div class="action-name" data-i18n="biasCheck">Bias Check</div>
          <div class="action-desc" data-i18n="biasCheckDesc">Detect slant &amp; source bias</div>
        </div>
      </button>
      <button class="action-btn" data-analysis="ai-detection" disabled>
        <div class="action-icon purple"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="4" width="12" height="12" rx="3"/><circle cx="8" cy="9" r="1.2" fill="currentColor"/><circle cx="12" cy="9" r="1.2" fill="currentColor"/><path d="M7.5 13c1 1 4 1 5 0"/></svg></div>
        <div class="action-info">
          <div class="action-name" data-i18n="aiDetectionLabel">AI Detection</div>
          <div class="action-desc" data-i18n="aiDetectionDescShort">Human or AI-generated?</div>
        </div>
      </button>
      <button class="action-btn" data-analysis="plagiarism" disabled>
        <div class="action-icon orange"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="10" height="12" rx="1.5"/><rect x="7" y="5" width="10" height="12" rx="1.5"/></svg></div>
        <div class="action-info">
          <div class="action-name" data-i18n="plagiarismLabel">Plagiarism</div>
          <div class="action-desc" data-i18n="plagiarismDescShort">Check originality</div>
        </div>
      </button>
      <button class="action-btn full-width" data-analysis="comprehensive" disabled style="--btn-glow: rgba(244,63,94,0.06);">
        <div class="action-icon rose"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 2l2.3 4.7L17 7.5l-3.5 3.4.8 4.8L10 13.5l-4.3 2.2.8-4.8L3 7.5l4.7-.8z"/></svg></div>
        <div class="action-info">
          <div class="action-name" data-i18n="fullAnalysis">Full Analysis</div>
          <div class="action-desc" data-i18n="fullAnalysisDesc">Fact-check + bias + AI + plagiarism in one pass</div>
        </div>
      </button>
    </div>

    <div class="section-divider"></div>

    <!-- ─── Quick Links ─── -->
    <div class="section-label" data-i18n="quickLinks">Quick Links</div>
    <div class="quick-links">
      <a class="quick-link" id="linkDashboard" target="_blank" rel="noopener">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="6" height="6" rx="1.5"/><rect x="11" y="3" width="6" height="3" rx="1"/><rect x="11" y="8" width="6" height="9" rx="1.5"/><rect x="3" y="11" width="6" height="6" rx="1.5"/></svg>
        <span data-i18n="dashboard">Dashboard</span>
      </a>
      <a class="quick-link" id="linkHistory" target="_blank" rel="noopener">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7.5"/><path d="M10 5.5V10l3 2"/></svg>
        <span data-i18n="historyLabel">History</span>
      </a>
      <a class="quick-link" id="linkVerify" target="_blank" rel="noopener">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 3H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-4"/><path d="M13 3l4 4-7 7H6v-4z"/></svg>
        <span data-i18n="verifyLabel">Verify</span>
      </a>
      <a class="quick-link" id="linkSettings" target="_blank" rel="noopener">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="2.5"/><path d="M10 1.5v2m0 13v2m-6-8.5h2m13 0h-2m-1.3-5.2-1.4 1.4m-9.6 9.6-1.4 1.4m0-12.4 1.4 1.4m9.6 9.6 1.4 1.4"/></svg>
        <span data-i18n="settingsLabel">Settings</span>
      </a>
    </div>

    <!-- API Key Footer -->
    <div class="key-footer" id="keyFooter">
      <div class="key-info">
        <div class="key-dot"></div>
        <span class="key-prefix" id="keyPrefix">klar_xxxx</span>
      </div>
      <button class="key-change" id="changeKeyBtn" data-i18n="changeKey">Change key</button>
    </div>
