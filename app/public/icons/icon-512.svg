<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#008c50"/>
      <stop offset="100%" stop-color="#00e88a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Scale beam (tilted — truth rises) -->
  <line x1="128" y1="230" x2="384" y2="180" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <!-- Center pillar -->
  <line x1="256" y1="205" x2="256" y2="384" stroke="white" stroke-width="20" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="192" y1="384" x2="320" y2="384" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <!-- Fulcrum triangle -->
  <polygon points="237,195 275,195 256,168" fill="white"/>
  <!-- Left pan (heavier — claims side) -->
  <path d="M96 230 Q128 296 160 230" stroke="white" stroke-width="12" fill="rgba(255,255,255,0.1)" stroke-linecap="round"/>
  <circle cx="128" cy="270" r="10" fill="rgba(255,255,255,0.4)"/>
  <!-- Right pan (lighter — verified side) with checkmark -->
  <path d="M352 180 Q384 246 416 180" stroke="white" stroke-width="12" fill="rgba(255,255,255,0.1)" stroke-linecap="round"/>
  <polyline points="360,200 376,218 404,186" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
