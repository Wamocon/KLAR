<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>
  <!-- Magnifying glass body -->
  <circle cx="228" cy="218" r="108" fill="none" stroke="white" stroke-width="32" opacity="0.95"/>
  <!-- Glass handle -->
  <line x1="310" y1="300" x2="400" y2="390" stroke="white" stroke-width="36" stroke-linecap="round" opacity="0.95"/>
  <!-- Checkmark inside glass -->
  <polyline points="180,218 215,253 280,178" fill="none" stroke="white" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
